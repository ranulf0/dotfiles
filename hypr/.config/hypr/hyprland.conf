exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = waybar
exec-once = hypridle
exec-once = nm-applet
exec-once = ~/.config/hypr/scripts/monitors.sh hdmi

input {
    kb_layout = us
    kb_variant = intl
    kb_options = lv3:ralt_alt
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

cursor {
    no_warps = true
}

general {
    gaps_in = 10
    gaps_out = 10
    layout = dwindle
    border_size = 2
    col.active_border = rgba(ffffff88) rgba(ffffff22) 45deg
    col.inactive_border = rgba(88888844)
}

dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

decoration {
    rounding = 12
    active_opacity = 0.95
    inactive_opacity = 0.8
    blur {
        enabled = false
        size = 8
        passes = 2
        new_optimizations = true
    }
}

misc {
    focus_on_activate = true
    disable_hyprland_logo = true
    background_color = 0x000000
}

# Workspaces
workspace = 1
workspace = 2
workspace = 3
workspace = 4
workspace = 5
workspace = 6
workspace = 7
workspace = 8
workspace = 9
workspace = 10

# Keybinds

$mod = ALT

bind = $mod, RETURN, exec, alacritty
bind = $mod, Q, killactive

bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

bind = $mod SHIFT, H, swapwindow, l
bind = $mod SHIFT, L, swapwindow, r
bind = $mod SHIFT, K, swapwindow, u
bind = $mod SHIFT, J, swapwindow, d

bind = $mod CTRL, H, movewindow, l
bind = $mod CTRL, L, movewindow, r
bind = $mod CTRL, K, movewindow, u
bind = $mod CTRL, J, movewindow, d

bind = $mod, F, fullscreen
bind = $mod SHIFT, SPACE, togglefloating
bind = $mod, SPACE, cyclenext, tiled


bind = $mod, D, exec, rofi -show drun

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
bind = $mod, b, workspace, 217

bind = $mod SHIFT, 1, movetoworkspacesilent, 1
bind = $mod SHIFT, 2, movetoworkspacesilent, 2
bind = $mod SHIFT, 3, movetoworkspacesilent, 3
bind = $mod SHIFT, 4, movetoworkspacesilent, 4
bind = $mod SHIFT, 5, movetoworkspacesilent, 5
bind = $mod SHIFT, 6, movetoworkspacesilent, 6
bind = $mod SHIFT, 7, movetoworkspacesilent, 7
bind = $mod SHIFT, 8, movetoworkspacesilent, 8
bind = $mod SHIFT, 9, movetoworkspacesilent, 9
bind = $mod SHIFT, 0, movetoworkspacesilent, 10
bind = $mod SHIFT, B, movetoworkspacesilent, 217

binde = $mod CTRL SHIFT, H, resizeactive, -40 0
binde = $mod CTRL SHIFT, L, resizeactive, 40 0
binde = $mod CTRL SHIFT, K, resizeactive, 0 -40
binde = $mod CTRL SHIFT, J, resizeactive, 0 40

binde = $mod SUPER, H, moveactive, -40 0
binde = $mod SUPER, L, moveactive, 40 0
binde = $mod SUPER, K, moveactive, 0 -40
binde = $mod SUPER, J, moveactive, 0 40

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

bind = $mod, R, layoutmsg, togglesplit

bind = $mod SHIFT, R, exec, hyprctl reload
bindl = $mod SHIFT, M, exec, ~/.config/hypr/scripts/monitors.sh

bind = $mod, S, layoutmsg, preselect b
bind = $mod, V, layoutmsg, preselect r

# Volume
binde = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
binde = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
binde = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
binde = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle

# Media
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# Brightness
binde = , XF86MonBrightnessUp, exec, brightnessctl set +5%
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Screenshot (grim + slurp)
bind = , Print, exec, grimblast copy screen
bind = SHIFT, Print, exec, grimblast save screen ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
bind = CTRL, Print, exec, grimblast copy area
bind = CTRL SHIFT, Print, exec, grimblast save area ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
bind = $mod, Print, exec, grimblast copy active
bind = $mod SHIFT, Print, exec, grimblast save active ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png

# Browser
bind = $mod, C, exec, firefox
bind = $mod, N, exec, firefox --private-window

# Keyboard toggle
bind = SUPER, SPACE, exec, sh -c "hyprctl devices | grep intl && hyprctl keyword input:kb_variant '' || hyprctl keyword input:kb_variant intl"

# Lock
bind = SUPER, L, exec, hyprlock

bind = ALT, G, exec, ~/.config/github/scripts/rofi.sh
